server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: orders-api-file
    static_configs:
      - targets: [localhost]
        labels:
          job: orders-api-promtail
          service: orders-api
          __path__: /var/log/observability-lab/app.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            trace_id: trace_id
            span_id: span_id
            route: route
            status: status
      - labels:
          level:
          route:
          service:
      - output:
          source: msg

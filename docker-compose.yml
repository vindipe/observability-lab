name: observability-lab

services:
  app:
    build:
      context: ./app
    container_name: obs-lab-app
    environment:
      APP_PORT: 8080
      REDIS_ADDR: redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_SAMPLE_RATIO: ${OTEL_SAMPLE_RATIO:-1.0}
      DEPLOYMENT_ENVIRONMENT: ${DEPLOYMENT_ENVIRONMENT:-local}
      DEMO_ERROR_RATE: ${DEMO_ERROR_RATE:-0.40}
      LOG_FILE: /var/log/observability-lab/app.log
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - app-logs:/var/log/observability-lab
    depends_on:
      redis:
        condition: service_started
      otel-collector:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: obs-lab-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.118.0
    container_name: obs-lab-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - app-logs:/var/log/observability-lab:ro
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
      - "8888:8888"
      - "8889:8889"
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: obs-lab-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
      - --storage.tsdb.retention.time=6h
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - app
      - alertmanager
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: obs-lab-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.2
    container_name: obs-lab-loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.7.1
    container_name: obs-lab-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "${TEMPO_PORT:-3200}:3200"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    container_name: obs-lab-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
      - alertmanager
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4.2
    container_name: obs-lab-promtail
    profiles: ["promtail"]
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./promtail/config.yaml:/etc/promtail/config.yaml:ro
      - app-logs:/var/log/observability-lab:ro
    depends_on:
      - loki
    restart: unless-stopped

  mimir:
    image: grafana/mimir:2.15.0
    container_name: obs-lab-mimir
    profiles: ["advanced"]
    command: ["-config.file=/etc/mimir/mimir.yaml"]
    volumes:
      - ./mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro
      - mimir-data:/data/mimir
    ports:
      - "9009:9009"
    restart: unless-stopped

volumes:
  app-logs:
  redis-data:
  prometheus-data:
  alertmanager-data:
  loki-data:
  tempo-data:
  grafana-data:
  mimir-data:

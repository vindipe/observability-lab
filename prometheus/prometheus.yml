global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  # Direct application scrape: the simplest and most explicit metrics path.
  - job_name: demo-app
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8080"]
        labels:
          service: orders-api
          environment: local

  # OpenTelemetry Collector internal/self metrics.
  - job_name: otel-collector-internal
    static_configs:
      - targets: ["otel-collector:8888"]

  # Metrics re-exported by the OpenTelemetry Collector Prometheus exporter.
  - job_name: otel-collector-exported
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

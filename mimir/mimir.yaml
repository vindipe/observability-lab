# Optional local Mimir configuration.
# Use with: docker compose --profile advanced up -d
# Prometheus remote_write can be switched to prometheus/prometheus-mimir.yml.

multitenancy_enabled: false

server:
  http_listen_port: 9009
  grpc_listen_port: 9095

common:
  storage:
    backend: filesystem
    filesystem:
      dir: /data/mimir
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/blocks
  tsdb:
    dir: /data/mimir/tsdb
  bucket_store:
    sync_dir: /data/mimir/tsdb-sync

compactor:
  data_dir: /data/mimir/compactor

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/ruler

alertmanager_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/alertmanager

limits:
  ingestion_rate: 100000
  ingestion_burst_size: 200000
